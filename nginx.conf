events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ============================================
    # RATE LIMITING
    # ============================================
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:5m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_req_status 429;
    limit_conn_status 429;

    server_tokens off;
    client_max_body_size 100M;

    # ============================================
    # PROXY CACHE
    # ============================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=ghost_cache:100m max_size=1g inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    map $http_cookie $skip_cache {
        default 0;
        ~*ghost-admin 1;
        ~*ghost-members 1;
    }

    # Cloudflare Real IP (Trust all for now, narrow down in production)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    upstream ghost {
        server ghost:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ============================================
        # CACHE PURGE WEBHOOK ENDPOINT
        # ============================================
        location /api/purge-cache {
            client_max_body_size 0;
            proxy_pass http://cache-purge:9000/purge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Content-Type application/json;
            proxy_http_version 1.1;
        }

        # ADMIN PANEL
        location /ghost {
            proxy_cache off;
            proxy_pass http://ghost;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # HTML PAGES + CACHE
        location / {
            proxy_cache ghost_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_bypass $skip_cache;
            proxy_no_cache $skip_cache;
            
            proxy_pass http://ghost;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=600, s-maxage=600, stale-while-revalidate=60" always;
        }

        # STATIC FILES
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_cache ghost_cache;
            proxy_cache_valid 200 7d;
            proxy_pass http://ghost;
            proxy_set_header Host $host;
            expires 30d;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
